<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syliebilie</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f0f0f0;
      color: #333;
    }
    header {
      background: linear-gradient(90deg, #ff3333, #ff9900);
      color: white;
      padding: 60px 20px;
      text-align: center;
      background-image: url('https://i.imgur.com/7yUvePI.jpg');
      background-size: cover;
      background-position: center;
      border-bottom: 5px solid #222;
    }
    header h1 {
      margin: 0;
      font-size: 3em;
    }
    header p {
      font-size: 1.2em;
      margin-top: 10px;
    }
    section {
      padding: 40px;
      text-align: center;
      background-color: #1a1a1a;
      color: #fff;
      border-radius: 15px;
      margin: 20px auto;
      max-width: 800px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .youtube-button {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 30px;
      background-color: #ff0000;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      transition: background 0.3s;
    }
    .youtube-button:hover {
      background-color: #cc0000;
    }
    footer {
      background-color: #222;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

<header>
  <h1>Syliebilie</h1>
  <p>Welkom! Ik ben Sylvester Hermans 😎 Gamer & YouTuber</p>
  <a class="youtube-button" href="https://www.youtube.com/@Syliebilie" target="_blank">Bekijk mijn YouTube</a>
</header>

<section>
  <h2>Over mij</h2>
  <p>Hoi! Ik ben Sylvester Hermans, 11 jaar oud, Gryffindor 🦁 en ik hou van Fortnite, Minecraft en gamen.  
     Hier deel ik alles over mijn kanalen en avonturen!</p>
</section>

<footer>
  &copy; 2026 Syliebilie | Volg mij op YouTube
</footer>

</body>
</html>
